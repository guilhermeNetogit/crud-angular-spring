spring.datasource.url=jdbc:h2:mem:MY_DB_PROD;MODE=MSSQLServer;DATABASE_TO_UPPER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS dbo
spring.datasource.username=sa
