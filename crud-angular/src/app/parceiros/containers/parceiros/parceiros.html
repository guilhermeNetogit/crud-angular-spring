<mat-card>

  @if (parceiros$ | async; as lista) {

  @if (lista.parceiros.length > 0) {
  <app-parceiros-list
    [dataSource]="dataSource"
    (add)="onAdd()"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)"
    (filter)="applyFilter($event)">
  </app-parceiros-list>
  <mat-paginator
  [pageSizeOptions]="[5, 10, 25, 50]"
  [pageIndex]="pageIndex"
  [pageSize]="pageSize"
  [length]="lista.totalElements"
  (page)="onPageChange($event)"
  showFirstLastButtons aria-label="Select page of partners"></mat-paginator>
  } @else {
  <!-- Mensagem amigável que aparece após fechar o Dialog -->
  <div class="error-state">
    <mat-icon color="warn">cloud_off</mat-icon>
    <p>O servidor parece estar offline no momento.</p>
    <button mat-raised-button color="primary" (click)="refresh()">
      Tentar Novamente
    </button>
  </div>
  }

  } @else {
  <div class="load-spinner">
    <mat-spinner></mat-spinner>
  </div>
  }

</mat-card>
