<mat-card>

  <mat-form-field>
    <mat-label>Filter</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Ex. ium" #input>
  </mat-form-field>

  @if (parceiros$ | async) {

  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let element"> {{element.id}}</td>
    </ng-container>

    <!-- Position Column -->
    <ng-container matColumnDef="position">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        <mat-icon [fontIcon]="'No.' | category"></mat-icon>
        No.
      </th>
      <td mat-cell *matCellDef="let element"> {{element.position}} </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        <mat-icon [fontIcon]="'Name' | category"></mat-icon>
        Name
      </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <!-- Weight Column -->
    <ng-container matColumnDef="weight">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        <mat-icon [fontIcon]="'Weight' | category"></mat-icon>
        Weight
      </th>
      <td mat-cell *matCellDef="let element"> {{element.weight}} </td>
    </ng-container>

    <!-- Symbol Column -->
    <ng-container matColumnDef="symbol">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>
        <mat-icon [fontIcon]="'Symbol' | category"></mat-icon>
        Symbol
      </th>
      <td mat-cell *matCellDef="let element"> {{element.symbol}} </td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <!-- CABEÇALHO: Ações Globais -->
      <th mat-header-cell *matHeaderCellDef>
        <button mat-icon-button [matMenuTriggerFor]="menuGlobal" class="btn-actions-menu">
          <mat-icon>more_vert</mat-icon>
        </button>

        <mat-menu #menuGlobal="matMenu">
          <button mat-menu-item (click)="onAdd()">
            <mat-icon color="primary">add</mat-icon>
            <span>Inserir Novo</span>
          </button>
        </mat-menu>
      </th>

      <!-- LINHAS: Ações Individuais -->
      <td mat-cell *matCellDef="let element">
      <button mat-icon-button [matMenuTriggerFor]="menuIndividual" class="btn-actions-menu">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #menuIndividual="matMenu">
        <button mat-menu-item (click)="editar(element.id)">
          <mat-icon color="accent">edit</mat-icon>
          <span>Editar Item</span>
        </button>
        <button mat-menu-item (click)="deletar(element.id)">
          <mat-icon color="warn">delete</mat-icon>
          <span>Deletar Item</span>
        </button>
      </mat-menu>
      <td mat-cell *matCellDef="let element">
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="5">No data matching the filter "{{input.value}}"</td>
    </tr>
  </table>
  } @else {
  <div class="load-spinner">
    <mat-spinner></mat-spinner>
  </div>
  }

</mat-card>
